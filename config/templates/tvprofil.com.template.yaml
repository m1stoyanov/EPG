---
version: 1.0
author: Hristo Genev
timezone: Europe/Sofia
enabled: false

date-parameter:
  format: yyyy-MM-dd

request:
  url: https://tvprofil.com/${localizedUrlString}/#!datum=${date}&kanal=${channelId}
  # The programs on the page are not existing in the raw HTML source. They are generated by some embedded JavaScript
  # which can't be parsed directly. 
  # The option use-browser tells the grabber to download the HTML via a real browser instance. That is, the code on the 
  # page will be downloaded and parsed by a real browser. Then the resulting HTML will be passed to the AngleSharp parser 
  # for further processing. This adds an overhead as a browser instance will need to be spin up. 
  # If a browser is not found one will be downloaded on the fly.
  with-browser: true
  # Tell the browser when to consider the page as loaded.
  # Possible values are:
  # load - Waits for the load event (default).
  # domcontentloaded - waits for the DOMContentLoaded event.
  # networkidle0 - Waits until there are no network connections for 500ms.
  # networkidle2 - Waits until there are no more than 2 network connections for 500ms.
  page-loaded-event: networkidle0
  # proxy: 
  #   # For security purposes, we will use environment variables to pass the proxy credentials.
  #   # Using env vars with double underscore prefix is intentional. 
  #   # It tells the grabber the variable is secure so it will NOT display it's value in the logs
  #   address: ${__PROXYURL}
  #   port: 13128
  #   username: ${__PROXYUSER}
  #   password: ${__PROXYPASSWORD}
  debug: false
  delay-between-requests: 5000
  # operations:
      # Verify today's date exists in the page source, otherwise skip this
    # - name: validate-regex-exists
    #   hook: after
    #   arguments: [ "id=\"channel-date\">.*?, 0*${date.format(d)}" ]
    #   on-failure: break-daily
    #   debug: false

programs:
  debug: false
  locator: '#schedule-table .row'

elements:
  - name: start
    debug: false
    locator: .time

  - name: title
    debug: false
    locator: '[class="col"]'

  - name: detailsUrl
    locator: a
    attribute: href
    # operations: 
    #   - name: prepend
    #     arguments: [ https://tvprofil.com ]
    #     conditions: [ value-not-empty ]


program-details:
  enabled: ${detailsEnabled}
  request:
    delay-between-requests: 5000
    url: https://tvprofil.com${detailsUrl}
    cache-lifetime: -1
  elements:
    - name: desc
      locator: p.description
      locator-strategy: csspath
    - name: icon
      locator: meta[name='og:image']
      attribubte: content

