author: Hristo Genev

date-parameter:
  format: list
  list: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]

request:
  debug: false
  url: https://tv-programa.bg/${channelId}/${date}

programs:
  locator: table.table-program > tbody > tr

elements:
  - name: start
    attribute: data-start
    time-format: yyyy-MM-ddTHH:mm:sszzz

  - name: stop
    attribute: data-end
    time-format: yyyy-MM-ddTHH:mm:sszzz

  - name: title
    language: bg
    locator: .program-title > strong
    operations:
      - name: beautify
        hook: after

  - name: desc
    language: bg
    locator: .program-desc.desc > i
    operations:
      - name: beautify
        hook: after

timeouts:
  between-requests: 1

