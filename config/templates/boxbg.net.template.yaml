#     url: '${detailsUrl}'

#   elements:
#     - name: desc
#       locator: .ext-details
#     - name: date
#       locator: .year


channel-parameters:
  btvcinema.bg:
     channelId: 7
     channelUrl: bTV Cinema
  hbo3.bg:
    channelId: 88
    channelUrl: HBO Comedy