---
author: Hristo Genev

date-parameter:
  format: ddMMyyyy

request:
  url: https://tv.boxbg.net/channel/${channelUrl}/${channelId}?${date}
  # with-browser: true
  # debug: true
  operations:
    - name: regex-unescape
      hook: after
      debug: false

programs:
  locator: .list-events a
  debug: true

elements:
  - name: start
    debug: false
    locator-strategy: regex
    locator: start_at&quot;\:&quot;(.*?)&quot;,
    time-format: yyyy-MM-dd HH:mm:00
    

  - name: title
    debug: false
    locator-strategy: regex
    locator: text&quot;\:&quot;(.*?)&quot;,
    operations: 
      - name: replace
        arguments: [ "&quot;", "\"" ]

#   - name: detailsUrl
#     locator: a
#     attribute: href

