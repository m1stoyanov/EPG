version: 1.0
author: Hristo Genev

date-parameter:
  format: list
  list: [1, 2, 3, 4, 5, 6]

request:
  url: https://tvplus.com.tr/canli-tv/yayin-akisi/${channelId}
  debug: false

programs:
  locator: $.props.pageProps.allPlaybillList[${date}][:]
  locator-strategy: jsonpath
  debug: false
  operations:
  - name: remove-before
    hook: before 
    debug: false
    arguments: [ <script id="__NEXT_DATA__" type="application/json">, true ]
  - name: remove-after
    debug: false
    hook: before 
    arguments: [ </script>, true]

elements:
  - name: start
    debug: false
    locator:  starttime
    #2024-10-29 22:55:00 UTC+03:00
    #2025-06-27T00:00:00.0000000+03:00
    # time-format: yyyy-MM-ddTHH:mm:00.0000000+03:00
    time-format: o
    # operations:
    # - name: regex-extract
    #   hook: after
    #   arguments: [ "\\d{4}-\\d{2}-\\d{2}T*\\s*\\d{2}:\\d{2}:\\d{2} UTC\\+03:00" ]

  - name: title
    locator: name

