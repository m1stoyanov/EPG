---
version: 1.0
author: Hristo Genev

date-parameter:
  format: list
  list: [ 1,2,3,4,5,6,7 ]
  # The date-list-type can be absolute or relative. The default value if omitted is relative
  # Relative means, that values from date-list will be used from the first value on. If you 
  # started grabbing on Wednesday, then Wednesday will be 1, Thursday will be 2 etc.
  # Absolute means, that values from date-list will be used as per the current day of the week index
  # i.e. if today is Tuesday (the second day of the week), the grabber will use the second value from the date-list.
  # when it starts grabbing programs for the 3-rd day of the week, the 3-rd value will be used and so forth.
  list-type: relative


request:
  url: https://pickbox.tv/bg/programa/

programs:
  # locator: div[data-slick-index='${date}'] > div.epg-article-item-holder
  locator: div.epg-content-information div.epg-article-item-holder
  debug: true
elements:

  - name: start
    locator: .time-epg-holder span
    debug: true

  # - name: subtitle
  #   locator: .epg-original-title

  - name: title
    locator: .epg-local-title    
    # operations:
    #   - name: append
    #     hook: after
    #     arguments: [ ' - ${subtitle}' ]
    #     conditions: [ argument-not-empty ]

  - name: detailsUrl
    locator: a
    attribute: href

 
program-details:
  request: 
    url: ${detailsUrl}
    # Cache lifetime in hours.
    # If negative, once downloaded, the content will be cached and always read from cache i.e. cache will never expire
    # If zero, cache will never be used i.e. it will expire imidiately
    # If a positive value is used, the cache will be used until it expires
    # In our case, we always want to use cached files since this is a show description that never changes
    cache-lifetime: -1
  elements:
    - name: desc
      locator: "#tab1default p"
      # operations:
      #   - name: beautify
      #     hook: after
