---
author: Hristo Genev
week-overflow: false

date-parameter:
  format: list
  list: [ 1,2,3,4,5,6,7 ]


request:
  url: https://bulgaria24.org/program/
   
programs:
  locator: .u-accordion-item:nth-of-type(${date}) p
  separator: <br>
  property: innerHtml
  debug: true

elements:
  - name: start
    locator-strategy: regex
    locator: "\\d{1,2}[:|\\.]\\d{2}\\s*"
    debug: false

  - name: title
    locator: .*
    locator-strategy: regex
    operations: 
      - name: regex-remove
        hook: after
        arguments: [ "^\\d{1,2}:\\d{2}\\s*" ]